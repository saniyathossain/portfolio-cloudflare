<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>{{TITLE}} — Saniyat Hossain</title>
  <style>
    :root { color-scheme: light }
    * { box-sizing: border-box }
    body {
      margin: 0; min-height: 100dvh; display: grid; place-items: center; padding: 1.5rem;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
      color: #0a0a0a;
      background:
        radial-gradient(60rem 40rem at 80% -10%, rgba(255,214,164,.20), transparent 60%),
        linear-gradient(160deg, #f6f4f1, #eceae7);
    }
    .card {
      max-width: 30rem; text-align: center; padding: 2.5rem 2rem; border-radius: 2rem;
      background: linear-gradient(180deg, rgba(255,255,255,.9), rgba(255,255,255,.72));
      border: 1px solid rgba(255,255,255,.7);
      box-shadow: 0 20px 60px -18px rgba(17,17,17,.22), inset 0 1px 0 rgba(255,255,255,.9);
    }
    .ico {
      width: 3.5rem; height: 3.5rem; display: grid; place-items: center; margin: 0 auto 1.25rem;
      border-radius: 1.1rem; color: #fff;
      background: linear-gradient(145deg, #cf8047, #b15f2c);
      box-shadow: 0 8px 20px -6px rgba(177,95,44,.6), inset 0 1px 0 rgba(255,255,255,.4);
    }
    .ico svg { width: 1.75rem; height: 1.75rem }
    h1 { font-size: 1.5rem; line-height: 1.2; letter-spacing: -.02em; margin: 0 0 .6rem }
    p { font-size: .95rem; line-height: 1.6; color: rgba(17,17,17,.62); margin: 0 auto 1.6rem; max-width: 24rem }
    a.cta {
      display: inline-flex; align-items: center; gap: .6rem; text-decoration: none;
      font-weight: 600; font-size: .9rem; color: #fff;
      background: linear-gradient(145deg, #2b2b2b, #060606);
      padding: .7rem 1.4rem; border-radius: 999px;
      box-shadow: 0 10px 24px rgba(17,17,17,.2), inset 0 1px 0 rgba(255,255,255,.14);
    }
    a.cta svg { width: 1rem; height: 1rem }
  </style>
</head>
<body>
  <main class="card">
    <span class="ico" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a4 4 0 0 0-5.4 5.3L3 18l3 3 6.4-6.3a4 4 0 0 0 5.3-5.4l-2.6 2.6-2-2 2.6-2.6Z"/></svg>
    </span>
    <h1>{{TITLE}}</h1>
    <p>{{MESSAGE}}</p>
    <a class="cta" href="mailto:{{EMAIL}}">
      Email me
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 7-8.99 5.73a2 2 0 0 1-2.02 0L2 7"/><rect x="2" y="4" width="20" height="16" rx="2"/></svg>
    </a>
  </main>
</body>
</html>
