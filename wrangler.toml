name = "saniyat-portfolio"
main = "src/index.js"
compatibility_date = "2024-12-01"
# Custom domain: saniyat.com (configure in Cloudflare dashboard → Workers → Domains & Routes)

[assets]
directory = "./public"
binding = "ASSETS"

# src/maintenance.html is imported as a text module in src/index.js — wrangler's DEFAULT module rules
# already treat **/*.html as Text, so no custom [[rules]] entry is needed (adding one overrides the
# default and warns).

# --- Contact form (POST /api/contact) --------------------------------------------------------------
# All three backing services below are OPTIONAL and guarded in src/index.js: the endpoint validates
# and returns success even before they're configured, so deploying in stages is safe.

# Public, non-secret vars. CONTACT_FROM must be an address on a domain with Email Routing enabled;
# CONTACT_TO must be a VERIFIED destination address in Email Routing.
[vars]
CONTACT_FROM = "contact@saniyat.com"
CONTACT_TO = "saniyat1000@gmail.com"

# Maintenance mode — site-wide hard gate (503). Set to "1"/"true"/"on" to enable (flip here + redeploy,
# or override live in Dashboard → the Worker → Settings → Variables). Owner bypass while gated:
# https://saniyat.com/?preview=<ADMIN_TOKEN>. Optional copy overrides: MAINTENANCE_TITLE / MAINTENANCE_MESSAGE.
MAINTENANCE_MODE = "off"

# ⚠️ The two bindings below are COMMENTED OUT so the first deploy succeeds with no setup.
# They are OPTIONAL and guarded in src/index.js (the contact endpoint still validates + logs; it just
# won't persist to KV or send email until you enable them). Uncomment each after its one-time setup:
#
# Email Routing send_email binding — lets the Worker send the notification email.
#   1. Dashboard → your zone → Email → Email Routing → enable + verify the destination (CONTACT_TO).
#   2. Uncomment the 3 lines below, then redeploy.
# [[send_email]]
# name = "CONTACT_EMAIL"
# destination_address = "saniyat1000@gmail.com"
#
# KV — durable record of every submission (free tier).
#   1. Create it once:  npx wrangler kv namespace create CONTACT_KV
#   2. Paste the printed id below, uncomment the 3 lines, then redeploy.
# [[kv_namespaces]]
# binding = "CONTACT_KV"
# id = "PASTE_REAL_KV_NAMESPACE_ID"

# Turnstile SECRET key — set as an encrypted secret, NOT here:
#   npx wrangler secret put TURNSTILE_SECRET
# (Create the widget in Dashboard → Turnstile; put its SITE key in portfolio.json → site.turnstileSiteKey.)

# Admin token for the read endpoint (GET /api/contact?token=... → recent submissions). Set via:
#   npx wrangler secret put ADMIN_TOKEN
# The GET endpoint returns 401 until this is set. Not linked from the UI.
